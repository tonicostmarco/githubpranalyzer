name: Docker build -> push -> deploy

on:
  push:
    branches: [ "main" ]
    
jobs:
  build-and-deploy:
  
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: Build Jar
      run: ./mvnw clean package -DskipTests
      
    - name: Docker Hub Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
    - name: Build the image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/githubpranalyzer:latest .
      
    - name: Push the image to docker hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/githubpranalyzer:latest
      
    - name: Copy compose file to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml,nginx.conf"
        target: "~/app"
        
    - name: SSH and deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
                  docker stop githubpranalyzer || true
                  docker rm githubpranalyzer || true
                  docker pull ${{ secrets.DOCKER_USERNAME }}/githubpranalyzer:latest
                  cd ~/app && GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} docker compose up -d
